paths:
  uploads: public/images
  static: public

collections_config:
  pages:
    path: src/content/pages
    url: "/[slug]/"
    icon: wysiwyg
    _enabled_editors:
      - visual
      - data
    schemas:
      page:
        path: .cloudcannon/schemas/page.md
        name: Page
      page_builder:
        path: .cloudcannon/schemas/page-builder.md
        name: Page Builder
        new_preview_url: /
    add_options:
      - name: Page
        schema: page
        icon: wysiwyg
        editor: content
      - name: Page Builder
        schema: page_builder
        icon: dashboard
  blog:
    path: src/content/blog
    url: "/blog/[slug]/"
    icon: post_add
    _enabled_editors:
      - visual
      - content
      - data
    schemas:
      default:
        path: .cloudcannon/schemas/post.md
        name: Blog Post
    add_options:
      - name: Blog Post
        schema: default
        icon: post_add
        editor: content

collection_groups:
  - heading: Pages
    collections:
      - pages
  - heading: Blogging
    collections:
      - blog
  - heading: Data
    collections:
      - data

data_config:
  nav:
    path: src/data/nav.json
  social:
    path: src/data/social.json

file_config:
  - glob: src/data/nav.json
    _inputs:
      $:
        type: array
        options:
          structures: _structures.nav_links
      $[*]:
        type: object
        options:
          preview:
            text:
              - key: text
              - Nav Link
            icon:
              - link
  - glob: src/data/social.json
    _inputs:
      $[*]:
        type: url

_inputs:
  title:
    type: text
  description:
    type: textarea
  pubDate:
    type: datetime
  author:
    type: text
  image:
    type: image
  imageAlt:
    type: text
  tags:
    type: multiselect
    options:
      allow_create: true
  category:
    type: select
    options:
      allow_create: true
  _schema:
    hidden: true
  content_blocks:
    type: array
    options:
      structures:
        values_from_glob:
          - /src/components/widgets/*.cloudcannon.structure-value.yml
  icon:
    type: select
    options:
      allow_create: true
      value_key: id
      preview:
        text:
          - key: name
      values: _select_data.icons
  iconClass:
    type: text
    comment: Tailwind classes for icon background and color (e.g. "bg-blue-500/10 text-blue-400")
  variant:
    type: select
    options:
      values:
        - primary
        - secondary
        - link
  isReversed:
    type: switch
  isAfterContent:
    type: switch
  columns:
    type: number
  href:
    type: url
  ariaLabel:
    type: text
  content:
    type: html
    options:
      allow_custom_markup: true

_select_data:
  icons:
    - name: GitHub
      id: lucide:github
    - name: Arrow Right
      id: lucide:arrow-right
    - name: Scan Search
      id: lucide:scan-search
    - name: Zap
      id: lucide:zap
    - name: Palette
      id: lucide:palette
    - name: Mail
      id: lucide:mail
    - name: Phone
      id: lucide:phone
    - name: Map Pin
      id: lucide:map-pin
    - name: User Check
      id: lucide:user-check
    - name: Wrench
      id: lucide:wrench
    - name: Briefcase
      id: lucide:briefcase
    - name: Globe
      id: lucide:globe
    - name: Search
      id: lucide:search
    - name: Rocket
      id: lucide:rocket
    - name: Box
      id: lucide:box
    - name: Check
      id: lucide:check
    - name: Eye
      id: lucide:eye
    - name: Lightbulb
      id: lucide:lightbulb
    - name: Users
      id: lucide:users
    - name: Refresh
      id: lucide:refresh-cw

_structures:
  actions:
    values:
      - label: Action
        icon: ads_click
        picker_preview:
          text:
            - Action
          icon:
            - ads_click
        preview:
          text:
            - key: text
            - Action
          icon:
            - ads_click
        value:
          text:
          href:
          variant: primary
          icon:
          ariaLabel:
  items:
    values:
      - label: Item
        icon: list
        picker_preview:
          text:
            - Item
          icon:
            - list
        preview:
          text:
            - key: title
            - Item
          icon:
            - list
        value:
          title:
          description:
          icon:
          iconClass:
  services:
    values:
      - label: Service
        icon: build
        picker_preview:
          text:
            - Service
          icon:
            - build
        preview:
          text:
            - key: title
            - Service
          icon:
            - build
        value:
          title:
          description:
          icon:
  nav_links:
    values:
      - label: Nav Link
        icon: link
        picker_preview:
          text:
            - Nav Link
          icon:
            - link
        preview:
          text:
            - key: text
            - Nav Link
          icon:
            - link
        value:
          text:
          href:
