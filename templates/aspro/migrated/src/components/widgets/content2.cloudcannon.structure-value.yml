    type: image
    options:
      paths:
        uploads: /src/assets/images
        static: ""
  imageAlt:
    type: text
    comment: Alt text for the image
  items:
    type: array
    options:
      structures: _structures.feature_items
  actions:
    type: array
    options:
      structures: _structures.actions
  isReversed:
    type: switch
  isAfterContent:
    type: switch
